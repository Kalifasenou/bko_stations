services:
  - type: web
    name: bko-station-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /api/health/
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: bko-stations.onrender.com,bko-station-backend.onrender.com
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "False"
      - key: CORS_ALLOWED_ORIGINS
        value: https://bko-stations-frontend.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://bko-stations.onrender.com,https://bko-station-backend.onrender.com,https://bko-stations-frontend.onrender.com
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: CSRF_COOKIE_SECURE
        value: "True"
      - key: DATABASE_URL
        fromDatabase:
          name: bko-station-db
          property: connectionString

  - type: web
    name: bko-station-frontend
    runtime: static
    rootDir: frontend
    buildCommand: "printf \"window.APP_CONFIG = { API_BASE_URL: 'https://bko-stations.onrender.com/api' };\\n\" > config.js"
    staticPublishPath: .
    autoDeploy: true

databases:
  - name: bko-station-db
    plan: free
    databaseName: bko_station
    user: bko_station_user
