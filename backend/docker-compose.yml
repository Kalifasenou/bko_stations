version: '3.8'

services:
  # Base de données PostgreSQL
  db:
    image: postgres:13-alpine
    container_name: bko-station-db
    environment:
      POSTGRES_DB: bko_station
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Cache Redis
  redis:
    image: redis:7-alpine
    container_name: bko-station-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Application Django
  web:
    build: .
    container_name: bko-station-api
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4"
    environment:
      DEBUG: "False"
      SECRET_KEY: "django-insecure-change-this-in-production"
      ALLOWED_HOSTS: "localhost,127.0.0.1,web"
      DB_ENGINE: "django.db.backends.postgresql"
      DB_NAME: "bko_station"
      DB_USER: "postgres"
      DB_PASSWORD: "postgres"
      DB_HOST: "db"
      DB_PORT: "5432"
      CACHE_BACKEND: "django.core.cache.backends.redis.RedisCache"
      CACHE_LOCATION: "redis://redis:6379/1"
      CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:8000"
    volumes:
      - .:/app
      - static_volume:/app/static
      - media_volume:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/statistics/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx (optionnel - pour production)
  nginx:
    image: nginx:alpine
    container_name: bko-station-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/static:ro
      - media_volume:/app/media:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
    profiles:
      - production

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:

networks:
  default:
    name: bko-station-network
