<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0E14"/>
      <stop offset="100%" style="stop-color:#1A1F2A"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00FF41"/>
      <stop offset="100%" style="stop-color:#00CC33"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  
  <!-- Glow effect -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#00FF41" stroke-width="2" opacity="0.3"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="#00FF41" stroke-width="1" opacity="0.2"/>
  
  <!-- Fuel pump icon -->
  <g transform="translate(256, 256)" fill="none" stroke="url(#glow)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <!-- Pump body -->
    <rect x="-60" y="-80" width="80" height="120" rx="8" fill="none"/>
    
    <!-- Pump display -->
    <rect x="-50" y="-60" width="60" height="30" rx="4" fill="#00FF41" opacity="0.2"/>
    
    <!-- Pump nozzle holder -->
    <rect x="20" y="-40" width="25" height="40" rx="4" fill="none"/>
    
    <!-- Hose -->
    <path d="M 45 -20 Q 80 -20 80 20 Q 80 60 45 60" fill="none"/>
    
    <!-- Nozzle -->
    <path d="M 35 60 L 55 60 L 60 80 L 30 80 Z" fill="#00FF41"/>
    
    <!-- Base -->
    <rect x="-70" y="40" width="100" height="20" rx="4" fill="none"/>
  </g>
  
  <!-- Location pin -->
  <circle cx="380" cy="120" r="30" fill="#00FF41" opacity="0.8"/>
  <circle cx="380" cy="120" r="15" fill="#0A0E14"/>
</svg>
