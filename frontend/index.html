<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0A0E14">
    <meta name="description" content="Bamako Gaz Tracker - Suivi en temps réel de la disponibilité du carburant">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Bamako Gaz">
    
    <title>Bamako Gaz Tracker ⛽</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon.svg">
    
    <!-- Cyber-BKO Theme -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Live Pulse Banner -->
    <div id="live-pulse" class="live-pulse" style="display: none;">
        <span class="pulse-dot"></span>
        <span id="pulse-text">Chargement...</span>
    </div>

    <!-- Map Container -->
    <div id="map"></div>

    <!-- Bottom Sheet - Station Details -->
    <div id="station-sheet" class="bottom-sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-content">
            <div class="station-header">
                <div class="station-info">
                    <h2 id="station-name">Sélectionnez une station</h2>
                    <span id="station-brand" class="brand-badge"></span>
                </div>
                <div id="station-status" class="status-indicator">
                    <span class="status-dot"></span>
                    <span id="status-text">Inconnu</span>
                </div>
            </div>
            
            <div class="station-details">
                <div class="detail-row">
                    <span class="detail-label">Dernière mise à jour</span>
                    <span id="last-update" class="detail-value">--</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Fiabilité</span>
                    <span id="trust-score" class="detail-value">--</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Situation électricité (zone)</span>
                    <span id="electricity-status" class="detail-value">--</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Situation gasoil</span>
                    <span id="gasoil-situation" class="detail-value">--</span>
                </div>
                <div class="detail-row" id="distance-row" style="display: none;">
                    <span class="detail-label">Distance</span>
                    <span id="station-distance" class="detail-value">--</span>
                </div>
            </div>

            <!-- Fuel Status Cards -->
            <div class="fuel-cards">
                <div class="fuel-card" id="essence-card">
                    <div class="fuel-icon">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M19.5 9.5C19.5 10.88 18.38 12 17 12C15.62 12 14.5 10.88 14.5 9.5C14.5 8.12 15.62 7 17 7C18.38 7 19.5 8.12 19.5 9.5M7 17H9V15H7V17M11 17H13V15H11V17M15 17H17V15H15V17M6 13V19H14V13H6M15 9C15 9 15 5 12 5C9 5 9 9 9 9H15"/>
                        </svg>
                    </div>
                    <span class="fuel-type">Essence</span>
                    <span id="essence-status" class="fuel-status">--</span>
                </div>
                <div class="fuel-card" id="gazole-card">
                    <div class="fuel-icon">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M19.5 9.5C19.5 10.88 18.38 12 17 12C15.62 12 14.5 10.88 14.5 9.5C14.5 8.12 15.62 7 17 7C18.38 7 19.5 8.12 19.5 9.5M7 17H9V15H7V17M11 17H13V15H11V17M15 17H17V15H15V17M6 13V19H14V13H6M15 9C15 9 15 5 12 5C9 5 9 9 9 9H15"/>
                        </svg>
                    </div>
                    <span class="fuel-type">Gazole</span>
                    <span id="gazole-status" class="fuel-status">--</span>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <button id="btn-available" class="action-btn confirm-btn">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
                    </svg>
                    IL Y A DU FUEL
                </button>
                <button id="btn-empty" class="action-btn report-btn">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                    </svg>
                    C'EST FINI
                </button>
            </div>
        </div>
    </div>

    <div id="auth-bar" class="auth-bar">
        <span id="auth-info">Mode invité</span>
        <button id="auth-toggle" class="auth-btn" type="button">Se connecter</button>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <button class="nav-btn active" data-view="map">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z"/>
            </svg>
            <span>Carte</span>
        </button>
        <button class="nav-btn" data-view="list">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/>
            </svg>
            <span>Liste</span>
        </button>
        <button class="nav-btn" data-view="alerts">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>
            </svg>
            <span>Alertes</span>
        </button>
        <button class="nav-btn" data-view="add-station">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
            </svg>
            <span>Ajouter</span>
        </button>
    </nav>

    <!-- Loading Overlay -->
    <div id="loading" class="loading-overlay">
        <div class="loader"></div>
        <p>Chargement de la carte...</p>
    </div>

    <!-- Install Prompt -->
    <div id="install-prompt" class="install-prompt" style="display: none;">
        <span>Installer l'app</span>
        <button id="install-btn">Installer</button>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="config.js"></script>
    <!-- App JS -->
    <script src="app.js"></script>
</body>
</html>
